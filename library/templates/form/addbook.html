<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Book - Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex items-center justify-center p-6">

  {% include 'message/message.html' %}


    <div class="bg-white w-full max-w-lg p-8 rounded-[2rem] shadow-xl shadow-slate-200/60 border border-slate-200">
      <div class="mb-8 text-center">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Add New Book</h2>
        <p class="text-slate-500 text-sm mt-2">Expand your library's digital collection</p>
        <div class="h-1 w-20 bg-indigo-500 mx-auto mt-4 rounded-full"></div>
      </div>

    {% include 'message/message.html' %}


      <form method="POST" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}

        <div>
          <label for="title" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Book Title</label>
          <input type="text" id="title" name="title" placeholder="e.g. The Great Gatsby" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-400" />
          {{ form.title }}
        </div>

        <div>
          <label for="author" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Author</label>
          <input type="text" id="author" name="author" placeholder="e.g. F. Scott Fitzgerald" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-400" />
          {{ form.author }}
        </div>

        <div>
          <label for="catagory" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Category</label>
          <input type="text" id="catagory" name="catagory" placeholder="e.g. Classic Fiction" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-400" />
          {{ form.catagory }}
        </div>

        <div>
          <label for="cover_image" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Cover Image <span class="text-slate-400 font-normal ml-1">(Optional)</span></label>

          <div class="relative group">
            <div class="absolute inset-0 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-2xl transition-all group-hover:bg-indigo-100/50"></div>

            <input type="file" id="cover_image" name="cover_image" accept="image/*" class="relative z-10 w-full opacity-0 cursor-pointer h-24" />

            {% if book.cover_image %}
              <img src="{{ book.cover_image.url }}" alt="{{ book.title }}" class="absolute inset-0 w-full h-full object-cover rounded-2xl pointer-events-none" />
            {% endif %}

            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
              <span class="text-2xl mb-1">🖼️</span>
              <span class="text-xs font-semibold text-indigo-600">Click to upload cover</span>
            </div>
          </div>
        </div>

        <div>
          <label for="description" class="block text-sm font-bold text-slate-700 mb-2 ml-1">Description</label>
          <textarea id="description" name="description" placeholder="Brief summary of the book..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all h-28 resize-none placeholder:text-slate-400">{{ form.description }}</textarea>
        </div>

        <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">Add to Collection</button>

        <div class="text-center pt-2">
          <a href="{% url 'home' %}" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-widest">← Back to Library</a>
        </div>
      </form>
    </div>
  </body>
</html>
