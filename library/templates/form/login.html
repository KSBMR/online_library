<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-[#f0f2f5] font-sans flex items-center justify-center min-h-screen m-0">

    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-[#2c3e50] mb-2">Welcome Back</h2>
        <p class="text-gray-500 text-sm mb-6">Please enter your details to login.</p>

            {% include 'message/message.html' %}

        
        <form method="POST" action="{% url 'userlogin' %}" class="space-y-5">
            {% csrf_token %}
            
            <div class="text-left">
                <label for="id_username" class="block text-sm font-semibold mb-1">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required 
                       class="w-full p-3 border border-gray-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div class="text-left">
                <div class="flex justify-between items-center mb-1">
                    <label for="id_password" class="text-sm font-semibold">Password</label>
                    <a href="#" class="text-xs text-blue-500 hover:underline">Forgot?</a>
                </div>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required 
                       class="w-full p-3 border border-gray-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-[#3498db] hover:bg-[#2980b9] text-white font-bold rounded-md text-lg transition duration-300 mt-2">
                Login
            </button>
        </form>

        <div class="mt-6 text-sm text-gray-500">
            Don't have an account? 
            <a href="{% url 'sign_up' %}" class="text-blue-500 font-bold hover:underline">Sign Up</a>
        </div>
    </div>

</body>
</html>
