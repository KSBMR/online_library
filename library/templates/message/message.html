{% if messages %}
        <div class="absolute top-4 w-full max-w-md mx-auto px-4">
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-md text-sm {{ message.tags }} bg-green-100 text-green-800">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
